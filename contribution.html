<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contribute to the Mt. SAC Robotics website">
  <meta name="author" content="Henry Tran">
  <title>Contribute | Mt.SAC Robotics</title>
  <link rel="icon" type="image/x-icon" href="static/images/mtsac.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="preload" href="static/css/fontawesome.all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="static/css/fontawesome.all.min.css"></noscript>
  <script defer src="static/js/fontawesome.all.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="static/css/index.css">
  <link rel="stylesheet" href="static/css/documentation.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-brand">mtsac_vex_robotics</a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="documentation.html">Documentation</a></li>
      <li><a href="index.html#vex-u-world-2026">VEX-U World 2026</a></li>
      <li><a href="index.html">Back to Home</a></li>
    </ul>
  </nav>

  <section class="doc-page">
    <div class="section-label">Team</div>
    <h1 class="section-title"></h1>
    <p style="color:rgba(255,255,255,0.6); margin-bottom:2rem;">
      Want to add photos, files, videos, or update content on the site? Fill out the form below and Henry will take care of it.
    </p>

    <form action="https://formspree.io/f/xbdvzrkv" method="POST" class="contribute-form">

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email"required>
      </div>

      <div class="form-group">
        <label for="type">What do you want to add?</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>Select a type</option>
          <option value="photo">Photo (carousel)</option>
          <option value="video">Video</option>
          <option value="file">File (documentation)</option>
          <option value="stats">Stats / Results update</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="page">Which page?</label>
        <select id="page" name="page" required>
          <option value="" disabled selected>Select a page</option>
          <option value="home">Home (index)</option>
          <option value="documentation">Documentation</option>
          <option value="recap">Worlds 2026 Recap</option>
          <option value="video">Video Page</option>
          <option value="other">Other / New page</option>
        </select>
      </div>

      <div class="form-group">
        <label for="content">Content / Link</label>
        <textarea id="content" name="content" rows="4" placeholder="Paste a Google Drive link, image URL, file link, or describe what you want added..."></textarea>
      </div>

      <div class="form-group">
        <label for="notes">Additional Notes</label>
        <textarea id="notes" name="notes" rows="3" placeholder="Any extra context — caption for a photo, tag for a doc file, etc."></textarea>
      </div>

      <button type="submit" class="btn btn-primary">
        <i class="fas fa-paper-plane"></i> Submit
      </button>

    </form>
  </section>

  <hr class="divider">

  <!-- FOOTER -->
  <footer>
    &copy; 2026 Henry Tran
  </footer>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <i class="fas fa-chevron-up"></i>
  </button>

  <script>
    const btn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 300);
    });

    const navToggle = document.getElementById('navToggle');
    const navLinks  = document.getElementById('navLinks');

    navToggle.addEventListener('click', () => {
      navToggle.classList.toggle('open');
      navLinks.classList.toggle('open');
    });

    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navToggle.classList.remove('open');
        navLinks.classList.remove('open');
      });
    });
  </script>

</body>
</html>
