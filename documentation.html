  <!-- FontAwesome -->

<body>

  <!-- NAV -->

    <a href="index.html" class="nav-brand">mtsac_vex_robotics</a>

      <span></span>
      <span></span>

    <ul class="nav-links" id="navLinks">
      <!-- <li><a href="index.html#documentation">Documentation</a></li> -->
      <li><a href="index.html#vex-u-world-2026">VEX-U World 2026</a></li>
      <li><a href="contribution.html">Upload Media & Files</a></li>
      <li><a href="index.html">Back to Home</a></li>
    </ul>
  </nav>

  <!-- FILE ARCHIVE -->
  <section class="doc-page">
    <div class="section-label">Documentation</div>
    <h1 class="section-title">File Archive</h1>

    <div class="file-tree">
      <div class="file-tree-header">
        <i class="fas fa-folder-open"></i> docs/
      </div>

      <div class="file-tree-folder">
        <div class="folder-label">
          <i class="fas fa-folder"></i> Code/ <span class="folder-count">1</span>
        </div>

        <div class="file-row">
          <i class="fas fa-file-alt"></i>
          <a href="code/Mt.SAC_Big_Bot.zip" target="_blank" class="file-name">Mt. SAC BIG BOT — Source Code</a>
          <span class="tag tag-personal">World 2026</span>
          <a href="code/Mt.SAC_Big_Bot.zip" target="_blank" class="file-link"><i class="fas fa-external-link-alt"></i></a>

  <hr class="divider">

  <!-- FOOTER -->
  <footer>
    &copy; 2026 Henry Tran
  </footer>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <i class="fas fa-chevron-up"></i>
  </button>

  <script>
    const btn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 300);
    });

    const navToggle = document.getElementById('navToggle');
    const navLinks  = document.getElementById('navLinks');

    navToggle.addEventListener('click', () => {
      navToggle.classList.toggle('open');
      navLinks.classList.toggle('open');
    });

    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navToggle.classList.remove('open');
        navLinks.classList.remove('open');
      });
    });
  </script>

</body>
</html>
