<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Coding tutorials for VEX Robotics Mt. SAC students">
  <meta name="author" content="Henry Tran">
  <title>Mt.SAC | PushBack 2025-2026</title>
  <link rel="icon" type="image/x-icon" href="static/images/mtsac.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="preload" href="static/css/fontawesome.all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="static/css/fontawesome.all.min.css"></noscript>
  <script defer src="static/js/fontawesome.all.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="static/css/index.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="nav-brand">mtsac_vex_robotics</span>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#documentation">Documentation</a></li>
      <li><a href="#vex-u-world-2026">VEX-U World 2026</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Hi folks, hope you find this helpful!</h1>
    <div class="hero-btns">
      <a href="#documentation" class="btn btn-primary">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Overleaf_Logo.svg" alt="Overleaf" style="height:1em;vertical-align:middle;">
        Documentation Archive
      </a>
      <a href="https://github.com/henrytran07/mtsac_tutorial" target="_blank" class="btn btn-outline">
        <i class="fab fa-github"></i> Push Back 2025–2026 Code
      </a>
      <a href="#vex-u-world-2026" class="btn btn-vex-world">
        <img src="static/images/VEX-Robotics.png" alt="VEX U Push Back 2025-2026" style="height:2.5em;vertical-align:middle;">
        Worlds 2026
      </a>
    </div>
  </section>

  <hr class="divider">

  <!-- GALLERY -->
  <div class="carousel-section" id="vex-u-world-2026">
    <div class="section-label">Our Memories</div>
    <div class="section-title">St. Louis, Missouri, USA · April 2026</div>

    <div class="carousel" id="carousel">
      <div class="carousel-slide active">
        <img src="static/images/world1.JPG" alt="World 1">
      </div>
      <div class="carousel-slide">
        <img src="static/images/world2.JPEG" alt="World 2">
      </div>
      <div class="carousel-slide">
        <img src="static/images/world3.JPG" alt="World 3">
      </div>
      <div class="carousel-slide">
        <img src="static/images/world4.JPEG" alt="World 4">
      </div>

      <button class="carousel-arrow carousel-arrow-left" id="carouselPrev" aria-label="Previous">
        <i class="fas fa-chevron-left"></i>
      </button>
      <button class="carousel-arrow carousel-arrow-right" id="carouselNext" aria-label="Next">
        <i class="fas fa-chevron-right"></i>
      </button>

      <div class="carousel-dots" id="carouselDots"></div>

    </div>
  </div>

<div class="carousel-section" id="ez-comp">
    <div class="section-title">EZ Competition · March 2026</div>

    <div class="carousel" id="carousel-ez">
      <div class="carousel-slide active">
        <img src="static/images/ez_comp1.webp" alt="EZ Competition 1">
      </div>
      <div class="carousel-slide">
        <img src="static/images/ez_comp2.webp" alt="EZ Competition 2">
      </div>
      <div class="carousel-slide">
        <img src="static/images/ez_comp3.webp" alt="EZ Competition 3">
      </div>

      <button class="carousel-arrow carousel-arrow-left" aria-label="Previous">
        <i class="fas fa-chevron-left"></i>
      </button>
      <button class="carousel-arrow carousel-arrow-right" aria-label="Next">
        <i class="fas fa-chevron-right"></i>
      </button>

      <div class="carousel-dots"></div>
    </div>
  </div>
  <hr class="divider">

  <!-- FOOTER -->
  <footer>
    &copy; 2026 Henry Tran
  </footer>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <i class="fas fa-chevron-up"></i>
  </button>

<script>
  // ── Scroll to top ──
  const btn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 300);
  });

  // ── Hamburger toggle ──
  const navToggle = document.getElementById('navToggle');
  const navLinks  = document.getElementById('navLinks');

  navToggle.addEventListener('click', () => {
    navToggle.classList.toggle('open');
    navLinks.classList.toggle('open');
  });

  navLinks.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      navToggle.classList.remove('open');
      navLinks.classList.remove('open');
    });
  });

  // ── Carousel (supports multiple independent carousels) ──
  function initCarousel(carouselEl) {
    const slides = carouselEl.querySelectorAll('.carousel-slide');
    const dotsContainer = carouselEl.querySelector('.carousel-dots');
    const prevBtn = carouselEl.querySelector('.carousel-arrow-left');
    const nextBtn = carouselEl.querySelector('.carousel-arrow-right');
    let current = 0;
    let autoTimer;

    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    });

    function goTo(index) {
      slides[current].classList.remove('active');
      dotsContainer.children[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      dotsContainer.children[current].classList.add('active');
      resetTimer();
    }

    function resetTimer() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(current + 1), 4000);
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));
    resetTimer();
  }

  document.querySelectorAll('.carousel').forEach(initCarousel);
</script>

</body>
</html>
